refresh_accounts:
  name: Refresh Accounts
  description: Refresh the list of linked bank accounts from Enable Banking.

refresh_transactions:
  name: Refresh Transactions
  description: Fetch latest transactions for all linked accounts.
  fields:
    days:
      name: Days
      description: Number of days to fetch (default 30).
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box

get_balance:
  name: Get Balance
  description: Get current balances for all linked accounts.

get_monthly_summary:
  name: Get Monthly Summary
  description: Get spending summary grouped by category for a given month.
  fields:
    month:
      name: Month
      description: Month number (1-12). Defaults to current month.
      required: false
      selector:
        number:
          min: 1
          max: 12
          mode: box
    year:
      name: Year
      description: Year. Defaults to current year.
      required: false
      selector:
        number:
          min: 2020
          max: 2030
          mode: box

categorize_transactions:
  name: Categorize Transactions
  description: Re-run auto-categorization on all cached transactions.

set_budget_limit:
  name: Set Budget Limit
  description: Set a monthly budget limit for a spending category.
  fields:
    category:
      name: Category
      description: The spending category (e.g., housing, food, transport).
      required: true
      selector:
        text:
    limit:
      name: Limit
      description: Monthly budget limit in EUR.
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.01
          mode: box

toggle_demo:
  name: Toggle Demo Mode
  description: Toggle demo mode on/off. Generates realistic synthetic banking data for testing and demonstration.

export_csv:
  name: Export CSV
  description: Export transactions as a CSV file for local download.
  fields:
    date_from:
      name: From Date
      description: Start date filter (YYYY-MM-DD). Optional.
      required: false
      selector:
        date:
    date_to:
      name: To Date
      description: End date filter (YYYY-MM-DD). Optional.
      required: false
      selector:
        date:
