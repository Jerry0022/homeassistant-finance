name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate code and versions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Python syntax
        run: |
          find custom_components/finance_dashboard -name "*.py" -exec python -m py_compile {} +

      - name: Validate JavaScript syntax
        run: |
          find custom_components/finance_dashboard/frontend -name "*.js" -exec node --check {} +
          node --check www/community/finance-dashboard/finance-dashboard.js

      - name: Validate version alignment
        run: python scripts/bump_versions.py --check

      - name: Validate payload sync
        run: python scripts/sync_addon_payload.py --check
