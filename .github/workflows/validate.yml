name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    name: Run tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Run pytest
        run: pytest tests/ -v

  validate:
    runs-on: ubuntu-latest
    name: Validate code and versions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Validate Python syntax
        run: |
          find custom_components/finance_dashboard -name "*.py" -exec python -m py_compile {} +

      - name: Validate JavaScript syntax
        run: |
          find custom_components/finance_dashboard/frontend -name "*.js" -exec node --check {} +
          node --check www/community/finance-dashboard/finance-dashboard.js

      - name: Validate YAML files
        run: |
          python -c "
          import yaml, sys
          files = [
              'custom_components/finance_dashboard/services.yaml',
              'finance_dashboard_companion/config.yaml',
              'finance_dashboard_companion/build.yaml',
          ]
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'  ✓ {f}')
              except Exception as e:
                  print(f'  ✗ {f}: {e}', file=sys.stderr)
                  sys.exit(1)
          "

      - name: Validate JSON files
        run: |
          python -c "
          import json, sys, glob
          files = [
              'custom_components/finance_dashboard/manifest.json',
              'custom_components/finance_dashboard/strings.json',
          ] + glob.glob('custom_components/finance_dashboard/translations/*.json')
          for f in files:
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'  ✓ {f}')
              except Exception as e:
                  print(f'  ✗ {f}: {e}', file=sys.stderr)
                  sys.exit(1)
          "

      - name: Validate version alignment
        run: python scripts/bump_versions.py --check

      - name: Validate payload sync
        run: python scripts/sync_addon_payload.py --check
